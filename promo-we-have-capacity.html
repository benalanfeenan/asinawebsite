<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Asina - We Have Capacity</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }

  .canvas {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
  }

  /* Full bleed background image */
  .bg-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .bg-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Gradient overlay that blends from left to right */
  .gradient-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to right,
      rgba(13, 94, 95, 0.97) 0%,
      rgba(26, 158, 143, 0.93) 30%,
      rgba(26, 158, 143, 0.7) 50%,
      rgba(58, 184, 154, 0.3) 65%,
      rgba(228, 177, 52, 0.15) 80%,
      transparent 100%
    );
    z-index: 1;
  }

  /* Subtle amber tint on the right edge */
  .amber-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to left,
      rgba(228, 177, 52, 0.2) 0%,
      transparent 40%
    );
    z-index: 2;
  }

  /* Content area */
  .content {
    position: relative;
    z-index: 10;
    padding: 50px 50px 50px 65px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 620px;
  }

  /* Logo */
  .logo-top {
    margin-bottom: 28px;
  }

  .logo-top img {
    height: 44px;
    filter: brightness(0) invert(1);
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    padding: 8px 20px;
    border-radius: 50px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 22px;
    width: fit-content;
    backdrop-filter: blur(4px);
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
  }

  .headline {
    font-family: 'Outfit', sans-serif;
    font-size: 62px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.08;
    margin-bottom: 18px;
  }

  .headline .highlight {
    color: #fde68a;
  }

  .subtext {
    font-size: 19px;
    color: rgba(255, 255, 255, 0.88);
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 32px;
  }

  /* Contact info row */
  .contact-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
  }

  .contact-icon {
    width: 38px;
    height: 38px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    backdrop-filter: blur(4px);
  }

  .contact-icon svg {
    width: 16px;
    height: 16px;
  }

  .contact-label {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .contact-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.25);
  }

  /* Service pills on the right */
  .service-pills {
    position: absolute;
    bottom: 40px;
    right: 35px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
    z-index: 10;
  }

  .service-pill {
    background: rgba(255,255,255,0.92);
    color: #0d5e5f;
    padding: 10px 20px;
    border-radius: 50px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    backdrop-filter: blur(8px);
  }

  .pill-icon {
    width: 24px;
    height: 24px;
    background: #1A9E8F;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pill-icon svg {
    width: 12px;
    height: 12px;
  }

  /* Bottom accent bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(to right, #0d5e5f, #1A9E8F 40%, #E4B134);
    z-index: 15;
  }
</style>
</head>
<body>
<div class="canvas">
  <!-- Full background image -->
  <div class="bg-image">
    <img src="main-hero.png" alt="Asina support worker helping participant with baking">
  </div>

  <!-- Gradient overlays for smooth blend -->
  <div class="gradient-overlay"></div>
  <div class="amber-overlay"></div>

  <!-- Left content -->
  <div class="content">
    <div class="logo-top">
      <img src="asina-logo.png" alt="Asina Disability Support">
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Now Accepting New Participants
    </div>

    <h1 class="headline">
      We Have<br>
      <span class="highlight">Capacity.</span>
    </h1>

    <p class="subtext">
      We're currently taking on new participants across all of our services in Armidale and the New England Region.
    </p>

    <div class="contact-row">
      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <div>
          <div class="contact-label">Call Us</div>
          1300 851 190
        </div>
      </div>

      <div class="contact-divider"></div>

      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <div>
          <div class="contact-label">Visit</div>
          asinadisabilitysupport.com.au
        </div>
      </div>
    </div>
  </div>

  <!-- Floating service pills -->
  <div class="service-pills">
    <div class="service-pill">
      <span class="pill-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      Household Tasks
    </div>
    <div class="service-pill">
      <span class="pill-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      Community Access
    </div>
    <div class="service-pill">
      <span class="pill-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
      Supported Independent Living
    </div>
  </div>

  <!-- Bottom accent bar -->
  <div class="bottom-bar"></div>
</div>
</body>
</html>
