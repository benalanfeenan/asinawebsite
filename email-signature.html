.vacancy-inner { display: grid; grid-template-columns: 1fr 1.2fr; gap: 48px; align-items: center; position: relative; z-index: 2; }
.vacancy-image { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-xl); }
.vacancy-image img { width: 100%; height: 320px; object-fit: cover; }
.vacancy-content { color: var(--white); }
.vacancy-tag { display: inline-block; background: var(--amber); color: var(--dark); padding: 6px 16px; border-radius: 50px; font-size: 0.78rem; font-weight: 700; font-family: var(--font-display); margin-bottom: 20px; letter-spacing: 0.5px; }
.vacancy-content h2 { color: var(--white); font-size: clamp(1.6rem, 3vw, 2.2rem); margin-bottom: 16px; }
.vacancy-content p { color: rgba(255,255,255,0.7); font-size: 1.05rem; margin-bottom: 28px; line-height: 1.8; }

/* ========== FOUNDER ========== */
.founder { padding: 100px 0; position: relative; overflow: hidden; }
.founder::before { content: ''; position: absolute; top: 5%; right: -12%; width: 35%; height: 60%; background: radial-gradient(ellipse at center, rgba(26,158,143,0.05) 0%, transparent 70%); pointer-events: none; }
.founder::after { content: ''; position: absolute; bottom: 10%; left: -10%; width: 30%; height: 50%; background: radial-gradient(ellipse at center, rgba(228,177,52,0.04) 0%, transparent 70%); pointer-events: none; }
.founder-grid { display: grid; grid-template-columns: 380px 1fr; gap: 60px; align-items: start; }
.founder-photo-col { position: sticky; top: 120px; }
.founder-photo { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg); margin-bottom: 24px; }
.founder-photo img { width: 100%; height: 440px; object-fit: cover; }
.founder-badges { display: flex; flex-wrap: wrap; gap: 8px; }
.founder-badge-item { padding: 8px 16px; background: var(--teal-10); border: 1px solid var(--teal-20); border-radius: 50px; font-size: 0.8rem; font-weight: 500; color: var(--teal-dark); }
.founder-content .section-title span { color: var(--teal); }
.founder-role { font-size: 1rem; color: var(--text-light); font-weight: 500; margin-bottom: 8px; }
.founder-email { color: var(--teal); font-weight: 600; font-size: 0.95rem; margin-bottom: 28px; display: inline-block; }
.founder-text p { font-size: 1rem; color: var(--text); line-height: 1.9; margin-bottom: 18px; }
.founder-quote {
  margin: 32px 0;
  padding: 28px 32px;
  background: var(--teal-10);
  border-left: 4px solid var(--teal);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-style: italic;
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--dark);
}
.timeline { margin-top: 48px; }
.timeline h3 { font-size: 1.2rem; margin-bottom: 24px; }
.timeline-items { position: relative; padding-left: 32px; }
.timeline-items::before { content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(to bottom, var(--teal), var(--amber)); border-radius: 2px; }
.timeline-item { position: relative; margin-bottom: 28px; }
.timeline-item::before { content: ''; position: absolute; left: -32px; top: 8px; width: 16px; height: 16px; border-radius: 50%; background: var(--white); border: 3px solid var(--teal); }
.timeline-item:last-child::before { border-color: var(--amber); background: var(--amber); }
.timeline-year { font-family: var(--font-display); font-weight: 700; font-size: 0.88rem; color: var(--teal); margin-bottom: 4px; }
.timeline-role { font-weight: 600; font-size: 1rem; color: var(--dark); }
.timeline-org { font-size: 0.88rem; color: var(--text-light); }

/* ========== FOUNDER DARK SECTION OVERRIDES ========== */
#founder .timeline-items::before { background: linear-gradient(to bottom, rgba(255,255,255,0.5), var(--amber)); }
#founder .timeline-item::before { background: var(--white); border-color: rgba(255,255,255,0.6); }
#founder .timeline-item:last-child::before { border-color: var(--amber); background: var(--amber); }

/* ========== FOUNDER SUCCESS STORY ========== */
.founder-success-story {
  margin-top: 40px;
  padding: 32px;
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.1);
}
.founder-success-story-label {
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--amber);
  margin-bottom: 12px;
}
.founder-success-story h3 {
  font-size: 1.3rem;
  color: #fff;
  margin-bottom: 20px;
  font-weight: 700;
}
.founder-success-story p {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.85);
  line-height: 1.9;
  margin-bottom: 14px;
}
.founder-success-story p:last-of-type {
  margin-bottom: 0;
}
.founder-success-story .story-closing {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 2px solid rgba(228,177,52,0.3);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1rem;
  color: #fff;
  font-style: italic;
}

/* ========== CONTACT ========== */
.contact { padding: 100px 0; background: linear-gradient(135deg, var(--dark) 0%, #1a3040 100%); }
.contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 48px; }
.contact-info .section-title { margin-bottom: 16px; color: var(--white); }
.contact-info > p { color: rgba(255,255,255,0.7); font-size: 1rem; margin-bottom: 36px; line-height: 1.8; }
.contact-trust { display: flex; gap: 12px; margin-bottom: 36px; }
.trust-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(26,158,143,0.15); border-radius: 50px; font-size: 0.8rem; font-weight: 600; color: var(--teal-light); }
.contact-details { display: flex; flex-direction: column; gap: 20px; }
.contact-detail { display: flex; align-items: center; gap: 16px; }
.contact-detail-icon { width: 48px; height: 48px; flex-shrink: 0; background: rgba(26,158,143,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.contact-detail h4 { font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.contact-detail p, .contact-detail a { font-size: 1rem; font-weight: 600; color: var(--white); }
.contact-detail a:hover { color: var(--teal-light); }
.contact-form-wrapper { background: var(--off-white); border-radius: var(--radius-lg); padding: 40px; border: 1px solid var(--border); }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.88rem; font-weight: 600; color: var(--dark); margin-bottom: 6px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--dark);
  background: var(--white);
  transition: var(--transition);
  outline: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-10); }
.form-group textarea { resize: vertical; min-height: 120px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ========== CTA BANNER ========== */
.cta-banner { padding: 80px 0; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); text-align: center; position: relative; overflow: hidden; }
.cta-banner::before { content: ''; position: absolute; top: -50%; left: -20%; width: 60%; height: 200%; background: radial-gradient(ellipse, rgba(255,255,255,0.05), transparent 70%); pointer-events: none; }
.cta-banner::after { content: ''; position: absolute; bottom: -40%; right: -15%; width: 50%; height: 150%; background: radial-gradient(ellipse, rgba(228,177,52,0.08), transparent 70%); pointer-events: none; }
.cta-banner h2 { color: var(--white); font-size: clamp(1.6rem, 3vw, 2.2rem); margin-bottom: 12px; }
.cta-banner p { color: rgba(255,255,255,0.8); font-size: 1.05rem; margin-bottom: 32px; max-width: 560px; margin-left: auto; margin-right: auto; }

/* ========== FOOTER ========== */
.footer { background: var(--dark); color: rgba(255,255,255,0.7); padding: 80px 0 0; position: relative; overflow: hidden; }
.footer::before { content: ''; position: absolute; top: -30%; right: -10%; width: 40%; height: 120%; background: radial-gradient(ellipse at center, rgba(26,158,143,0.06) 0%, transparent 70%); pointer-events: none; }
.footer::after { content: ''; position: absolute; bottom: -20%; left: -15%; width: 35%; height: 100%; background: radial-gradient(ellipse at center, rgba(26,111,160,0.05) 0%, transparent 70%); pointer-events: none; }
.footer-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
.footer-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.footer-logo-img { height: 42px; width: auto; filter: brightness(0) invert(1); }
.footer-logo-text { font-family: var(--font-display); font-weight: 700; font-size: 1.15rem; color: var(--white); }
.footer-brand p { font-size: 0.9rem; line-height: 1.8; margin-bottom: 20px; }
.footer h4 { font-family: var(--font-display); color: var(--white); font-size: 0.92rem; font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1.5px; }
.footer-links li { margin-bottom: 10px; }
.footer-links a { font-size: 0.88rem; color: rgba(255,255,255,0.6); transition: var(--transition); }
.footer-links a:hover { color: var(--teal-light); padding-left: 4px; }
.footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding: 24px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; }
.footer-bottom-links { display: flex; gap: 24px; }
.footer-bottom-links a { color: rgba(255,255,255,0.5); }
.footer-bottom-links a:hover { color: var(--teal-light); }

/* ========== FORM STATES ========== */
.form-success {
  background: linear-gradient(135deg, var(--teal-10), #e8f8f5);
  border: 2px solid var(--teal);
  border-radius: var(--radius-lg);
  padding: 48px 32px;
  text-align: center;
  animation: fadeInUp 0.5s ease;
}
.form-success-icon {
  width: 64px;
  height: 64px;
  background: var(--teal);
  color: var(--white);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin: 0 auto 20px;
}
.form-success h3 {
  font-size: 1.4rem;
  color: var(--dark);
  margin-bottom: 12px;
}
.form-success p {
  color: var(--text-light);
  font-size: 0.95rem;
  max-width: 400px;
  margin: 0 auto;
  line-height: 1.7;
}
.form-error {
  background: #fef2f2;
  border: 1px solid #fca5a5;
  border-radius: var(--radius);
  padding: 14px 20px;
  color: #dc2626;
  font-size: 0.88rem;
  margin-bottom: 16px;
  display: none;
}
.btn:disabled, .btn[disabled] {
  opacity: 0.6;
  cursor: not-allowed;
}
.btn-loading::after {
  content: '';
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== SERVICE PAGE ========== */
.service-page-hero { padding: 48px 0 0; }
.service-page-breadcrumb { font-size: 0.84rem; color: var(--text-light); margin-bottom: 20px; }
.service-page-breadcrumb a { color: var(--teal); font-weight: 500; }
.service-page-breadcrumb span { margin: 0 8px; }
.service-page-header { max-width: 720px; margin-bottom: 40px; }
.service-page-header h1 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); margin-bottom: 14px; }
.service-page-header p { font-size: 1.05rem; color: var(--text-light); line-height: 1.8; }
.service-page-img { width: 100%; height: 360px; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 48px; }
.service-page-img img { width: 100%; height: 100%; object-fit: cover; }
.service-page-body { padding-bottom: 80px; }
.service-page-body h2 { font-size: 1.4rem; margin-bottom: 16px; margin-top: 40px; }
.service-page-body h2:first-child { margin-top: 0; }
.service-page-body p, .service-page-body li { font-size: 0.95rem; color: var(--text); line-height: 1.8; }
.service-page-body ul { padding-left: 0; list-style: none; }
.service-page-body ul li { padding: 8px 0 8px 28px; position: relative; border-bottom: 1px solid var(--border); }
.service-page-body ul li::before { content: '\2713'; position: absolute; left: 0; color: var(--teal); font-weight: 700; }
.sp-steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-top: 20px; }
.sp-step { background: var(--off-white); border-radius: var(--radius); padding: 28px 24px; }
.sp-step-num { width: 36px; height: 36px; background: var(--teal); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; margin-bottom: 12px; }
.sp-step h3 { font-size: 1rem; margin-bottom: 8px; }
.sp-step p { font-size: 0.88rem; color: var(--text-light); }
.sp-funding-box { background: var(--teal-10); border: 1px solid var(--teal-20); border-radius: var(--radius); padding: 24px 28px; margin-top: 20px; }
.sp-funding-box li { border-bottom-color: var(--teal-20); }
.sp-other-services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 20px; }
.sp-other-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: var(--transition); text-decoration: none; color: inherit; display: block; }
.sp-other-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.sp-other-card img { width: 100%; height: 120px; object-fit: cover; }
.sp-other-card-body { padding: 16px; }
.sp-other-card-body h4 { font-size: 0.92rem; margin-bottom: 6px; }
.sp-other-card-body p { font-size: 0.82rem; color: var(--text-light); line-height: 1.6; }
.sp-cta-row { display: flex; gap: 16px; margin-top: 28px; flex-wrap: wrap; }

/* ========== VALUES ========== */
.values-section { padding: 100px 0; background: var(--off-white); position: relative; overflow: hidden; }
.values-section::before { content: ''; position: absolute; top: -20%; right: -10%; width: 40%; height: 140%; background: radial-gradient(ellipse at center, rgba(228,177,52,0.05) 0%, transparent 70%); pointer-events: none; }
.values-section::after { content: ''; position: absolute; bottom: -15%; left: -15%; width: 45%; height: 100%; background: radial-gradient(ellipse at center, rgba(26,158,143,0.05) 0%, transparent 70%); pointer-events: none; }
.values-header { text-align: center; max-width: 720px; margin: 0 auto 56px; }
.mission-vision { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 56px; }
.mv-card { padding: 40px; background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--border); position: relative; overflow: hidden; }
.mv-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.mv-card.mission::before { background: linear-gradient(90deg, var(--teal), var(--teal-light)); }
.mv-card.vision::before { background: linear-gradient(90deg, var(--amber), var(--amber-light)); }
.mv-card h3 { font-size: 1.3rem; margin-bottom: 14px; }
.mv-card p { font-size: 0.95rem; color: var(--text-light); line-height: 1.8; }
.values-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.value-card { text-align: center; padding: 36px 24px; background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); transition: var(--transition); }
.value-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: transparent; }
.value-icon { width: 60px; height: 60px; margin: 0 auto 16px; background: var(--teal-10); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
.value-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
.value-card p { font-size: 0.88rem; color: var(--text-light); line-height: 1.7; }

/* ========== REFERRAL / FEEDBACK / VACANCY PAGES ========== */
.referral-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: start; }
.referral-steps { margin-top: 32px; }
.referral-step { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 24px; }
.referral-step-num { width: 32px; height: 32px; flex-shrink: 0; background: var(--teal); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 0.82rem; }
.referral-step p { font-size: 0.92rem; color: var(--text); line-height: 1.6; padding-top: 4px; }
.form-section-title { font-size: 1.05rem; font-weight: 700; color: var(--dark); margin-top: 28px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.form-section-title:first-child { margin-top: 0; }
.feedback-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: start; }
.feedback-type-options { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.feedback-type-btn { padding: 10px 20px; border: 2px solid var(--border); border-radius: 50px; background: var(--white); font-family: var(--font-display); font-size: 0.88rem; font-weight: 500; color: var(--text); cursor: pointer; transition: var(--transition); }
.feedback-type-btn:hover, .feedback-type-btn.active { border-color: var(--teal); color: var(--teal); background: var(--teal-10); }
.commitment-list { margin-top: 24px; }
.commitment-item { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); }
.commitment-item .ci-icon { width: 36px; height: 36px; flex-shrink: 0; background: var(--teal-10); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.commitment-item p { font-size: 0.92rem; color: var(--text); line-height: 1.6; padding-top: 6px; }
.vacancy-detail-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; margin-top: 40px; }
.vacancy-features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 24px 0; }
.vacancy-feature { background: var(--teal-10); border-radius: var(--radius); padding: 14px 16px; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--teal-dark); }

/* FAQ */
.faq-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.faq-question { padding: 20px 24px; cursor: pointer; font-weight: 600; font-size: 1rem; display: flex; justify-content: space-between; align-items: center; background: var(--white); transition: var(--transition); }
.faq-question:hover { background: var(--off-white); }
.faq-question::after { content: '+'; font-size: 1.4rem; color: var(--teal); font-weight: 300; transition: var(--transition); }
.faq-item.open .faq-question::after { content: '\2212'; }
.faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.faq-answer-inner { padding: 0 24px 20px; font-size: 0.95rem; color: var(--text-light); line-height: 1.8; }

.mobile-nav {
  display: none;
  position: fixed;
  top: 0; right: -100%;
  width: 300px;
  max-width: 85vw;
  height: 100vh;
  height: 100dvh;
  background: linear-gradient(175deg, #1db589 0%, #1a9e8f 30%, #148076 100%);
  z-index: 9999;
  padding: 0;
  box-shadow: -10px 0 50px rgba(0,0,0,0.25);
  transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.mobile-nav.open { right: 0; }
.mobile-nav-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.15);

  top: 0;
  background: linear-gradient(175deg, #1db589 0%, #1a9e8f 100%);
  z-index: 2;
}
.mobile-nav-header img {
  height: 32px;
  width: auto;
  filter: brightness(0) invert(1);
}
.mobile-nav-close {
  width: 36px;
  height: 36px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.12);
  border-radius: 10px;
  font-size: 1.3rem;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.mobile-nav-close:hover { background: rgba(255,255,255,0.25); }
.mobile-nav-body { padding: 12px 0 100px; }
.mobile-nav-group { padding: 8px 0; }
.mobile-nav-group-label {
  padding: 6px 24px;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-display);
}
.mobile-nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  font-size: 0.92rem;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  transition: all 0.2s ease;
  border: none;
}
.mobile-nav a:hover, .mobile-nav a:active {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.mobile-nav a .mn-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.7;
}
.mobile-nav a:hover .mn-icon { opacity: 1; }
.mobile-nav-divider {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 4px 24px;
}
.mobile-nav-cta {
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.mobile-nav-cta a {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 0.9rem;
  text-decoration: none;
  font-family: var(--font-display);
  gap: 8px;
}
.mobile-nav-cta .mn-cta-primary {
  background: linear-gradient(135deg, var(--amber), #f0c040);
  color: var(--dark);
  box-shadow: 0 4px 16px rgba(228,177,52,0.3);
}
.mobile-nav-cta .mn-cta-secondary {
  background: #fff;
  color: var(--teal);
  border: 1px solid #fff;
  font-weight: 700;
}
.mobile-nav-cta .mn-cta-secondary:hover {
  background: var(--amber);
  color: var(--dark);
  border-color: var(--amber);
}
.mobile-nav-phone {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  color: rgba(255,255,255,0.65);
  font-size: 0.82rem;
  font-family: var(--font-display);
}
.mobile-nav-phone a {
  color: #fff;
  font-weight: 600;
  padding: 0;
  display: inline;
  font-size: 0.82rem;
}
.mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(2px); }
.mobile-overlay.show { opacity: 1; }

  .hero h1 { font-size: 2rem; }
  .hero-image-wrapper img { height: 320px; }
  .hero-float-card { display: none; }
  .about-grid { grid-template-columns: 1fr; }
  .services-featured { grid-template-columns: 1fr; }
  .services-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-bar { grid-template-columns: 1fr; }
  .vacancy-inner { grid-template-columns: 1fr; }
  .contact-grid { grid-template-columns: 1fr; }
  .mission-vision { grid-template-columns: 1fr; }
  .values-grid { grid-template-columns: repeat(2, 1fr); }
  .referral-grid, .feedback-grid, .vacancy-detail-grid { grid-template-columns: 1fr; }
  .sp-other-services { grid-template-columns: 1fr; }
  .vacancy-features { grid-template-columns: repeat(2, 1fr); }
  .service-page-hero .container { grid-template-columns: 1fr; }
  .service-page-img { height: 220px; }
  .founder-story-inner { padding: 36px 24px; }
  .founder-story-hero { grid-template-columns: 1fr; }
  .founder-story-photo img { height: 240px; }
  .form-row { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr; gap: 32px; }
  .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
}

/* ========== STICKY MOBILE CALL BAR ========== */
.mobile-call-bar {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 9997;
  background: var(--teal);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  padding: 0;
}
.mobile-call-bar a {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 24px;
  color: #fff;
  text-decoration: none;
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.mobile-call-bar svg { flex-shrink: 0; }
@media (max-width: 768px) {
  .mobile-call-bar { display: block; }
  footer { padding-bottom: 70px; }
}
</style>
